name: Publish Binary Package

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-15
    env:
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build FFmpeg xcframework
        run: ./Scripts/build-ffmpeg-ios.sh --version 8.1

      - name: Package release asset
        run: ./Scripts/build/create-release-package.sh

      - name: Validate packaged local package
        run: |
          rm -rf "$RUNNER_TEMP/SwiftFFmpeg-iOS"
          ditto -x -k release/SwiftFFmpeg-iOS.zip "$RUNNER_TEMP"
          cd "$RUNNER_TEMP/SwiftFFmpeg-iOS"
          swift package describe > /dev/null

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release/SwiftFFmpeg-iOS.zip
          generate_release_notes: true
